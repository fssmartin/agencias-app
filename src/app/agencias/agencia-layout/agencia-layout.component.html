
<div class="container">
  <div class="col">
    <h3>Listado de agencias:</h3>

    <app-list-agencia 
         [agencias]="agencias"
         (selectAgencia)="onSelectAgencia($event)">
    </app-list-agencia>

  </div>

  <div class="col"> 
    <h3>Detalle:</h3>

    <app-detail-agencia 
         [agencia]="agenciaSeleccionada">
    </app-detail-agencia>

  </div>
</div>
