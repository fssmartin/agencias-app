<nav class="navbar container-fluid"> 
	<ul>
      <ng-container *ngFor="let link of links">
            <li *ngIf="link.role === null;else enlaceUser ">
              <a
                  routerLinkActive="active"      
                  [routerLink]="link.path"
                  [routerLinkActiveOptions]="{ exact: false }">
                  {{ link.label }}
              </a> 
            </li>
          <ng-template #enlaceUser>
              <li *ngIf="link.role === authService.currentUser()?.role"   >
                <a 
                  routerLinkActive="active"      
                  [routerLink]="link.path"
                  [routerLinkActiveOptions]="{ exact: false }"
                  [title]="link.label">
                  {{ link.label }}
                </a> 
              </li>
          </ng-template>
      </ng-container>
  </ul>
 
  <ul *ngIf="isHeader" class="navbarUser">
      <li *ngIf="authService.isLogged(); else loggedOut">
          <a 
              class="userLogado"
              title="View User"
              [routerLink]="['/profile']"
            >
            <span>{{authService.iconByRole()}}{{authService.currentUser()?.name }}</span>
          </a>
            &nbsp;&nbsp;|&nbsp;&nbsp;
          <a (click)="authService.logout()" href="" title="Log Out">
             <i class="fa fa-sign-out-alt"></i>
          </a>
      </li>
      <ng-template #loggedOut>
        <li>
            <a 
              title="SIGN UP"
              routerLinkActive="active"      
              [routerLink]="['auth/register']"
              [routerLinkActiveOptions]="{ exact: true }">               
              <i class="fa fa-user-plus"></i>
            </a> 
         </li>
        <li>
            <a 
              title="LOG IN"
              routerLinkActive="active"      
              [routerLink]="['auth/login']"
              [routerLinkActiveOptions]="{ exact: false }">               
              <i class="fa fa-sign-in-alt"></i>
            </a> 
         </li>
      </ng-template>
  </ul>

</nav>
 

<hr>
